name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests and static checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry==1.8.5

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Compile Python sources
        run: poetry run python -m compileall -q main.py module_admin config middleware interceptors scripts alembic test

      - name: Check formatting
        run: |
          # 历史目录尚未统一使用 Black，显式限定当前强制检查范围。
          poetry run black --check --workers 1 \
            main.py \
            alembic/versions/0018_tenant_memberships.py \
            alembic/versions/0019_idempotency_batch_audit.py \
            alembic/versions/0020_notification_deliveries.py \
            alembic/versions/0021_tenant_operations_permissions.py \
            alembic/versions/0022_role_lifecycle.py \
            alembic/versions/0023_async_exports.py \
            module_admin/v1.py \
            module_admin/auth/authorization.py \
            module_admin/controller/secret_controller.py \
            module_admin/controller/tenant_controller.py \
            module_admin/controller/backup_controller.py \
            module_admin/controller/dictionary_controller.py \
            module_admin/controller/role_controller.py \
            module_admin/controller/user_controller.py \
            module_admin/dao/tenant_dao.py \
            module_admin/dao/tenant_scope.py \
            module_admin/entity/do/notification_do.py \
            module_admin/entity/do/operation_do.py \
            module_admin/entity/do/export_do.py \
            module_admin/entity/do/tenant_do.py \
            module_admin/entity/dto/tenant_dto.py \
            module_admin/error_codes.py \
            module_admin/service/system_config_service.py \
            module_admin/service/idempotency_service.py \
            module_admin/service/job_worker.py \
            module_admin/service/notification_service.py \
            module_admin/service/secret_manager.py \
            module_admin/service/excel_service.py \
            module_admin/service/export_service.py \
            module_admin/service/file_service.py \
            module_admin/service/task_handlers.py \
            module_admin/service/task_queue.py \
            module_admin/service/tenant_service.py \
            middleware/idempotency_middleware.py \
            scripts/task_worker.py
          poetry run isort --check-only --profile black .

      - name: Run lint
        run: poetry run flake8 --max-line-length=88 .

      - name: Audit Python dependencies
        run: |
          python -m pip install --disable-pip-version-check pip-audit
          pip-audit

      - name: Build application image
        run: docker build --tag fastapi-admin-vue:${{ github.sha }} .

      - name: Scan application image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: fastapi-admin-vue:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Validate migrations
        env:
          APP_ENV: development
          DEBUG: "true"
          MYSQL_HOST: 127.0.0.1
          MYSQL_POST: 3306
          MYSQL_USERNAME: ci
          MYSQL_PASSWORD: ci-password
          MYSQL_DATABASES: ci
          TIMEZONE: Asia/Shanghai
          REDIS_HOST: 127.0.0.1
          REDIS_POST: 6379
          REDIS_PASSWORD: ""
          REDIS_USERNAME: ""
          REDIS_DB: 0
          SECRET_KEY: ci-only-secret-key-that-is-long-enough
          ACCESS_KEY_ID: ci
          ACCESSKEY_SECRET: ci
          HOSTS: '["testserver", "127.0.0.1", "localhost"]'
          TRUSTED_PROXIES: '[]'
          ORIGINS: '["http://127.0.0.1"]'
          MEDOTHS: '["GET", "POST", "PUT", "DELETE", "OPTIONS"]'
          HEADERS: '["*"]'
          CREDENTIALS: "false"
        run: poetry run alembic upgrade head --sql > migration.sql

      - name: Run unit tests
        run: >-
          poetry run python -m pytest -q -m "not integration"
          --cov
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-report=html:htmlcov

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn

  integration:
    name: MySQL and Redis integration tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: integration-root-password
          MYSQL_DATABASE: fastapi_admin
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pintegration-root-password"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
          --health-start-period=20s
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    env:
      APP_ENV: development
      DEBUG: "false"
      MYSQL_HOST: 127.0.0.1
      MYSQL_POST: 3306
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: integration-root-password
      MYSQL_DATABASES: fastapi_admin
      TIMEZONE: Asia/Shanghai
      REDIS_HOST: 127.0.0.1
      REDIS_POST: 6379
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      SECRET_KEY: integration-only-secret-key-that-is-long-enough
      ACCESS_KEY_ID: integration
      ACCESSKEY_SECRET: integration
      HOSTS: '["testserver", "127.0.0.1", "localhost"]'
      TRUSTED_PROXIES: '[]'
      ORIGINS: '["http://127.0.0.1"]'
      MEDOTHS: '["GET", "POST", "PUT", "DELETE", "OPTIONS"]'
      HEADERS: '["*"]'
      CREDENTIALS: "false"
      RUN_INTEGRATION_TESTS: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry==1.8.5

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Apply schema migrations
        run: poetry run python -m scripts.migrate_database

      - name: Run integration tests
        run: poetry run python -m pytest -q -m integration
