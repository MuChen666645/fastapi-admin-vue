services:
  fastapi-app:
    build:
      context: ./
      dockerfile: ./Dockerfile
    depends_on:
      fastapi-mysql:
        condition: service_healthy
      fastapi-redis:
        condition: service_healthy
      fastapi-migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    networks:
      - common-network
    env_file:
      - ${APP_ENV_FILE:-.env.development}
    develop:
      watch:
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./poetry.lock
  fastapi-migrate:
    build:
      context: ./
      dockerfile: ./Dockerfile
    depends_on:
      fastapi-mysql:
        condition: service_healthy
    env_file:
      - ${APP_ENV_FILE:-.env.development}
    networks:
      - common-network
    command: ["python", "-m", "scripts.migrate_database"]
    restart: "no"
  fastapi-mysql:
    image: mysql:8.0
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASES:-fastapi_admin}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-fastapiadmin}
      MYSQL_USER: ${MYSQL_USER:-${MYSQL_USERNAME:-fastapi_app}}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fastapiadmin}
    env_file:
      - ${APP_ENV_FILE:-.env.development}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping --protocol=tcp -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "3306:3306"
    networks:
      - common-network
  fastapi-redis:
    image: redis:7.2-alpine
    volumes:
      - redis-data:/data
    env_file:
      - ${APP_ENV_FILE:-.env.development}
    command:
      - sh
      - -c
      - redis-server --requirepass "$${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "6379:6379"
    networks:
      - common-network
networks:
  common-network:
    driver: bridge
volumes:
  mysql-data:
  redis-data:
