services:
  fastapi-app:
    build:
      context: ./
      dockerfile: ./Dockerfile
    depends_on:
      fastapi-mysql:
        condition: service_healthy
      fastapi-redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - common-network
    env_file:
      - ${APP_ENV_FILE:-.env.development}
    develop:
      watch:
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./poetry.lock
  fastapi-mysql:
    image: mysql
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASES:-fastapi_admin}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping --protocol=tcp -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "3306:3306"
    networks:
      - common-network
  fastapi-redis:
    image: redis
    volumes:
      - redis-data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "6379:6379"
    networks:
      - common-network
networks:
  common-network:
    driver: bridge
volumes:
  mysql-data:
  redis-data:
